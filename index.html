    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

        <!--Cabeçalho da Página-->

                </figure>

                <p class="tipo-pokemon">Grass/Poison</p>
                <dl class="lista-estatisticas">
                    <!-- Item de Estatística -->
                    <!-- dt = descripton term = termo de descrição -->
                    <dt class="nome-estatistica">HP:</dt>
                    <!-- dd = description details = detalhes da descrição -->
                    <dd class="barra-estatistica">
                        <div class="barra-preenchimento" style="width: 45%;"></div>
                    </dd>

                    <!-- Item de Estatística -->
                    <!-- dt = descripton term = termo de descrição -->
